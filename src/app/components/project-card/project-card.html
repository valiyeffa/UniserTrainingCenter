<div class="project-card">
    <div class="image" [class.loading]="!imageLoaded">
        <img [src]="item.image" alt="Image" loading="lazy" decoding="async" [class.is-visible]="imageLoaded"
            (load)="onImageLoad()" (error)="onImageError()">
    </div>

    <div class="card-body">
        <p class="card-title">{{item.title.length>30? item.title.slice(0,31)+'..': item.title}}</p>
        <span class="card-text">{{item.text.length>40 ? item.text.slice(0,40)+'..' :item.text}}</span>
    </div>
</div>
