<section class="home-scnd-sect">
  <div class="container-fluid">
    <div class="row justify-content-center g-3 g-lg-4 text-center">
      @for (item of data; track $index) {
      <div class="col-12 col-sm-6 col-md-3 col-lg-2 d-flex justify-content-center">
        <div class="data-box d-flex flex-column align-items-center justify-content-evenly">
          <div class="box-img position-relative">
            <img loading="lazy" [src]="item.img" alt="Icon" />
            <div class="circle" [class.primary]="item.circle" [class.secondary]="!item.circle"></div>
          </div>
          <span>{{ item.title }}</span>
        </div>
      </div>
      }
    </div>
  </div>
</section>
